---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true
driver:
  name: docker
platforms:
  - name: homarr-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        homarr_debug_service_enabled: false

        # Variables for Homarr
        homarr_uid: 1000
        homarr_gid: 1000
        homarr_scheme: http
        homarr_hostname: localhost
        homarr_container_labels_traefik_enabled: false
        homarr_container_http_host_bind_port: 7575
        homarr_database_type: sqlite
        homarr_environment_variables_secret_encryption_key: 24d1a8bd7e87ce6d01d21bf5ef37a3574d6b1a0622f8641fc4da394ecba0c389
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
verifier:
  name: ansible
