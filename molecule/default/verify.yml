---
- name: Verify Homarr systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Homarr service to become active (up to 180s)
      ansible.builtin.systemd:
        name: homarr.service
      register: homarr_service
      until: homarr_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Homarr service is active
      ansible.builtin.assert:
        that: homarr_service.status.ActiveState == 'active'
        fail_msg: "homarr.service not active ({{ homarr_service.status.ActiveState }})"
        success_msg: "homarr.service is active"

    - name: Wait for Homarr HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:7575/"
        method: GET
        status_code: [200, 302, 307]
        follow_redirects: none
      register: homarr_endpoint
      until: homarr_endpoint.status in [200, 302, 307]
      retries: 120
      delay: 5

    - name: Assert Homarr HTTP endpoint responds
      ansible.builtin.assert:
        that: homarr_endpoint.status in [200, 302, 307]
        fail_msg: "Homarr did not respond as expected ({{ homarr_endpoint.status | default('no response') }})"
        success_msg: "Homarr responded with {{ homarr_endpoint.status }}"

    - name: Show Homarr systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Homarr systemd: {{ homarr_service.status.ActiveState }}"
          - "Homarr HTTP: {{ homarr_endpoint.status }}"
